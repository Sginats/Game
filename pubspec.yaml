name: ai_evolution
description: AI Evolution - An idle/incremental mobile game where players evolve an artificial intelligence by unlocking technologies.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.2.0
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/config/
    - assets/audio/
