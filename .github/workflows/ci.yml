name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
      - run: flutter pub get
      - name: Run tests
        run: |
          flutter test test/core/math/game_number_test.dart
          flutter test test/domain/models/domain_models_test.dart
          flutter test test/domain/models/meta_codex_integration_test.dart
          flutter test test/domain/mechanics/cost_calculator_test.dart
          flutter test test/domain/mechanics/offline_progression_test.dart
          flutter test test/domain/systems/tap_system_test.dart
          flutter test test/domain/systems/generator_system_test.dart
          flutter test test/domain/systems/upgrade_system_test.dart
          flutter test test/application/game_controller_test.dart
          flutter test test/application/game_controller_room_test.dart
          flutter test test/application/robot_guide_service_test.dart
          flutter test test/application/robot_guide_trust_test.dart
          flutter test test/application/robot_guide_service_enhanced_test.dart
          flutter test test/application/era_content_manager_test.dart
          flutter test test/application/room_scene_service_test.dart
          flutter test test/application/companion_service_test.dart
          flutter test test/application/route_service_test.dart
          flutter test test/application/side_activity_service_test.dart
          flutter test test/domain/models/companion_model_test.dart
          flutter test test/domain/models/route_faction_model_test.dart
          flutter test test/domain/models/side_activity_model_test.dart
          flutter test test/domain/models/room_scene_expansion_test.dart
          flutter test test/domain/models/post_core_systems_test.dart
          flutter test test/domain/models/ui_ux_systems_test.dart
          flutter test test/presentation/game_screen_widget_test.dart
          flutter test test/application/game_controller_perf_test.dart
          flutter test test/presentation/tech_tree_viewport_test.dart

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
      - run: flutter pub get
      - run: dart analyze lib

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [test, analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [test, analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
      - run: flutter pub get
      - run: flutter build web
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [test, analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
      - run: flutter pub get
      - run: flutter build linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle
