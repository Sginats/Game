name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Run Dart tests
        run: |
          dart run test/core/math/game_number_test.dart
          dart run test/domain/models/domain_models_test.dart
          dart run test/domain/models/meta_codex_integration_test.dart
          dart run test/domain/mechanics/cost_calculator_test.dart
          dart run test/domain/mechanics/offline_progression_test.dart
          dart run test/domain/systems/tap_system_test.dart
          dart run test/domain/systems/generator_system_test.dart
          dart run test/domain/systems/upgrade_system_test.dart
          dart run test/application/game_controller_test.dart
          dart run test/application/game_controller_room_test.dart
          dart run test/application/robot_guide_service_test.dart
          dart run test/application/robot_guide_trust_test.dart
          dart run test/application/era_content_manager_test.dart
          dart run test/application/room_scene_service_test.dart
          dart run test/application/companion_service_test.dart
          dart run test/application/route_service_test.dart
          dart run test/application/side_activity_service_test.dart
          dart run test/domain/models/companion_model_test.dart
          dart run test/domain/models/route_faction_model_test.dart
          dart run test/domain/models/side_activity_model_test.dart

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart analyze lib

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [test, analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [test, analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [test, analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
      - run: flutter pub get
      - run: flutter build linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle
